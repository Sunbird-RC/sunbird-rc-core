server {
    listen 80;
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    location /registry/ {
          proxy_pass http://registry:8081/;
    }

    location /claim-ms/ {
          proxy_pass http://claim-ms:8082/;
    }

    location /bucket/ {
          proxy_pass http://file-storage:9000/;
    }

    location /proxy/ {
          proxy_pass http://context-proxy-service:4400/proxy/;
    }

    location /public-key-service/ {
          proxy_pass http://public-key-service:3300/public-key-service/;
    }
    location /auth/ {
          proxy_pass          http://keycloak:8080/auth/;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Host   $host;
          proxy_set_header    X-Forwarded-Server $host;
          proxy_set_header    X-Forwarded-Port   $server_port;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # OID4VCI / OID4VP public gateway (additive; only active when oid4vc-service is deployed)
    location /oid4vc/ {
          proxy_pass http://oid4vc-service:3400/oid4vc/;
    }

    location /vp/ {
          proxy_pass http://oid4vc-service:3400/vp/;
    }

    # OID4VCI issuer metadata discovery
    location /.well-known/openid-credential-issuer {
          proxy_pass http://oid4vc-service:3400/.well-known/openid-credential-issuer;
    }

    # oid4vc-service's own OAuth AS metadata + JWKS (pre-authorized_code grant)
    location /.well-known/openid-configuration {
          proxy_pass http://oid4vc-service:3400/.well-known/openid-configuration;
    }

    location /oid4vc-jwks.json {
          proxy_pass http://oid4vc-service:3400/.well-known/jwks.json;
    }


    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
    root   /usr/share/nginx/html;
    }
}