server {
    listen 80;
    # HTTPS: required so the browser test wallet runs in a "secure context" —
    # WebCrypto (crypto.subtle) is unavailable over plain HTTP on a non-localhost
    # host, which breaks @auth0/mdl's mso_mdoc COSE signing in the browser. The
    # holder key + the three JOSE formats work over plain HTTP too (the wallet
    # uses @noble/curves, which needs no secure context), so port 80 stays fully
    # functional; 443 additionally unlocks mso_mdoc in the browser.
    # Cert is self-signed for the bare IP today (browser trust warning, but
    # transport IS encrypted). Swap in a Let's Encrypt cert once a DNS label is
    # attached to the public IP (e.g. rc-dev.centralindia.cloudapp.azure.com).
    listen 443 ssl;
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Test wallet (static holder UI) ---
    # Served under /wallet/. The trailing-slash proxy_pass rewrites the
    # /wallet/ prefix to / so the SPA's own nginx serves from its root; the
    # SPA uses a relative asset base (vite base './') so /wallet/assets/* keeps
    # resolving. A bare /wallet redirects to /wallet/ so the SPA loads.
    location = /wallet { return 301 /wallet/; }
    location /wallet/ {
          proxy_pass http://test-wallet:80/;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # OID4VCI / OID4VP public gateway — only routes relevant to this T2-scoped
    # cloud stack (no registry/keycloak/claim-ms/file-storage in this topology).
    #
    # Note: `proxy_pass` below has NO URI part (just scheme://host:port), and
    # `location` patterns have no trailing slash. That means nginx passes the
    # original request URI through unchanged rather than rewriting the
    # matched prefix — required because each proxied service's own route
    # prefix is chosen to exactly match its nginx location, so any rewriting
    # double-prefixes the path. (Found live: a bare `POST /credential-schema`
    # 404'd because `proxy_pass .../credential-schema/;` turned it into
    # `.../credential-schema/credential-schema`; the trailing-slash variant
    # then 404'd from the app itself, since Fastify doesn't treat
    # `/credential-schema` and `/credential-schema/` as equivalent.)
    location /oid4vc {
          proxy_pass http://oid4vc-service:3400;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /vp {
          proxy_pass http://oid4vc-service:3400;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /.well-known/openid-credential-issuer {
          proxy_pass http://oid4vc-service:3400/.well-known/openid-credential-issuer;
    }

    location /.well-known/openid-configuration {
          proxy_pass http://oid4vc-service:3400/.well-known/openid-configuration;
    }

    location /oid4vc-jwks.json {
          proxy_pass http://oid4vc-service:3400/.well-known/jwks.json;
    }

    location /health {
          proxy_pass http://oid4vc-service:3400/health;
    }

    # Dynamic JSON-LD context documents referenced (by URL) from ldp_vc
    # credentials' @context array — needs to be externally dereferenceable
    # both for wallets that fetch it and for identity-service's own
    # documentLoader, which resolves it via PUBLIC_URL (not the internal
    # service DNS name).
    location /contexts {
          proxy_pass http://oid4vc-service:3400;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # W3C VC Render Method (https://www.w3.org/TR/vc-render-method/) inline
    # SVG templates — externally dereferenceable for the same reason as
    # /contexts above.
    location /render-templates {
          proxy_pass http://oid4vc-service:3400;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # --- identity-service (DID/key management) ---
    location /did {
          proxy_pass http://identity:3332;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /utils {
          proxy_pass http://identity:3332;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # identity-service's own JWKS (VC-issuer signing keys) — distinct from
    # oid4vc-service's protocol JWKS above (/oid4vc-jwks.json).
    location /identity-jwks.json {
          proxy_pass http://identity:3332/.well-known/jwks.json;
    }

    location /identity-health {
          proxy_pass http://identity:3332/health;
    }

    # --- credential-schema ---
    # Convenience alias for the common double-prefix mistake
    # (POST /credential-schema/credential-schema, mirroring the location name
    # itself) — rewrite to the real route before proxying. Exact match (=)
    # so it only catches this specific literal path, not other sub-paths.
    location = /credential-schema/credential-schema {
          rewrite ^ /credential-schema break;
          proxy_pass http://credential-schema:3333;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /credential-schema {
          proxy_pass http://credential-schema:3333;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /schema-health {
          proxy_pass http://credential-schema:3333/health;
    }

    # --- credentials-service ---
    location /credentials {
          proxy_pass http://credential:3000;
          proxy_set_header    Host               $host;
          proxy_set_header    X-Real-IP          $remote_addr;
          proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    location /credential-health {
          proxy_pass http://credential:3000/health;
    }
}
