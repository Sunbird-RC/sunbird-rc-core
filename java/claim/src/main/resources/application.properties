server.port=8082

spring.datasource.url=${connectionInfo_uri:jdbc:postgresql://0.0.0.0:5432/registry}
spring.datasource.username=${connectionInfo_username:postgres}
spring.datasource.password=${connectionInfo_password}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
sunbirdrc.url=${sunbirdrc_url:http://localhost:8081}

uuid-property-name=${uuid_property_name:osid}

# Mitigates CVE-2022-22965 (Spring4Shell) DataBinder attack surface
spring.mvc.dispatch-options-request=false
# Actuator: explicit allowlist prevents CVE-2023-20873 wildcard bypass
management.endpoints.web.exposure.include=health,info
